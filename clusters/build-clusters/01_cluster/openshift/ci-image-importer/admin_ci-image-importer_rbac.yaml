---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: ci-image-importer
  namespace: ci
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: ci-image-importer
  namespace: ci
rules:
- apiGroups:
  - image.openshift.io
  resources:
  - imagestreams
  - imagestreamimports
  verbs:
  - create
  - get
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: ci-image-importer
  namespace: ci
roleRef:
  kind: Role
  name: ci-image-importer
  namespace: ci
subjects:
- kind: ServiceAccount
  name: ci-image-importer
  namespace: ci
